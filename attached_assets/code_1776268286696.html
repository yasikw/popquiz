<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#006764",
                    "tertiary-fixed-dim": "#64e8e3",
                    "outline-variant": "#b2ad9c",
                    "error-container": "#f74b6d",
                    "on-background": "#322f22",
                    "on-secondary": "#fff2cd",
                    "inverse-on-surface": "#a29d8c",
                    "secondary-fixed-dim": "#efc900",
                    "on-surface-variant": "#5f5b4d",
                    "inverse-primary": "#ff6b9d",
                    "surface-container": "#efe8d2",
                    "on-primary-container": "#4c0022",
                    "secondary-dim": "#5e4e00",
                    "on-tertiary-fixed": "#004745",
                    "on-tertiary-container": "#005c59",
                    "surface-container-highest": "#e4ddc5",
                    "error": "#b41340",
                    "secondary": "#6c5a00",
                    "background": "#fdf6e3",
                    "tertiary-dim": "#005957",
                    "primary-fixed-dim": "#f16092",
                    "on-primary": "#ffeff1",
                    "tertiary-container": "#74f7f1",
                    "tertiary-fixed": "#74f7f1",
                    "on-primary-fixed": "#000000",
                    "surface": "#fdf6e3",
                    "surface-container-low": "#f8f0dc",
                    "surface-bright": "#fdf6e3",
                    "surface-dim": "#dcd4bb",
                    "on-tertiary": "#bcfffb",
                    "secondary-fixed": "#ffd709",
                    "on-secondary-fixed-variant": "#665500",
                    "outline": "#7b7767",
                    "surface-container-high": "#eae2cb",
                    "on-primary-fixed-variant": "#5d002b",
                    "primary-fixed": "#ff709f",
                    "on-error-container": "#510017",
                    "error-dim": "#a70138",
                    "on-error": "#ffefef",
                    "on-surface": "#322f22",
                    "tertiary": "#006764",
                    "on-secondary-container": "#5b4b00",
                    "secondary-container": "#ffd709",
                    "inverse-surface": "#100e05",
                    "surface-variant": "#e4ddc5",
                    "primary": "#a8275a",
                    "surface-container-lowest": "#ffffff",
                    "primary-dim": "#98184f",
                    "on-secondary-fixed": "#453900",
                    "surface-tint": "#a8275a",
                    "primary-container": "#ff709f"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Plus Jakarta Sans"],
                    "label": ["Plus Jakarta Sans"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 2s linear infinite;
        }
    </style>
</head>
<body class="bg-surface/90 text-on-surface font-body overflow-hidden min-h-screen flex items-center justify-center p-6">
<!-- Compact Loader Modal Container -->
<div class="w-full max-w-sm bg-white dark:bg-surface-container rounded-[2rem] shadow-2xl p-8 flex flex-col items-center text-center space-y-6 relative overflow-hidden">
<!-- Subtle Background Accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary-container/20 rounded-full blur-2xl"></div>
<div class="absolute -bottom-12 -left-12 w-32 h-32 bg-secondary-container/20 rounded-full blur-2xl"></div>
<!-- Animated Loader (Inspired by Sample) -->
<div class="relative w-20 h-20 flex items-center justify-center">
<div class="absolute inset-0 border-4 border-primary-container/20 rounded-full"></div>
<div class="absolute inset-0 border-4 border-t-primary rounded-full animate-spin-slow"></div>
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<!-- Main Text -->
<div class="space-y-1">
<h2 class="text-2xl font-headline font-extrabold tracking-tight text-on-background">
                AI is generating your quiz...
            </h2>
<p class="text-sm text-on-surface-variant font-medium">
                Getting the most fun quiz ready for you
            </p>
</div>
<!-- Progress Bar Section -->
<div class="w-full space-y-3">
<div class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary to-primary-container w-[65%] rounded-full transition-all duration-1000 ease-out"></div>
</div>
<p class="text-xs font-bold text-on-surface-variant/70 tracking-wide">
                Usually takes 1-2 minutes
            </p>
</div>
<!-- Bubble Dots Progress (Keep the Bubblegum feel) -->
<div class="flex items-center justify-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-secondary-container"></div>
<div class="w-2 h-2 rounded-full bg-tertiary-container"></div>
</div>
</div>
</body></html>
